---
- name: Ensure Jenkins home directory exists
  file:
    path: /var/jenkins_home
    state: directory
    owner: 1000
    group: 1000
    mode: '0755'

- name: Start Jenkins container
  community.docker.docker_container:
    name: jenkins
    image: jenkins/jenkins:lts
    state: started
    restart_policy: always
    user: root # Temporário para permitir acesso ao docker socket se necessário
    ports:
      - "127.0.0.1:8080:8080" # Acessível apenas via localhost (Cloudflare Tunnel irá rotear)
      - "50000:50000"
    volumes:
      - /var/jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock # Permite Docker-in-Docker para pipelines
