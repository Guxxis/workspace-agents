---
- name: Ensure Guacamole config directory exists
  file:
    path: /opt/guacamole
    state: directory
    mode: '0755'

- name: Create docker-compose.yml for Guacamole
  copy:
    dest: /opt/guacamole/docker-compose.yml
    content: |
      version: '3'
      services:
        guacd:
          image: guacamole/guacd
          restart: always

        postgres:
          image: postgres:13
          restart: always
          environment:
            POSTGRES_USER: guacamole
            POSTGRES_PASSWORD: strong_password_here # Trocar em produção
            POSTGRES_DB: guacamole_db
          volumes:
            - ./init:/docker-entrypoint-initdb.d
            - ./data:/var/lib/postgresql/data

        guacamole:
          image: guacamole/guacamole
          restart: always
          ports:
            - "127.0.0.1:8081:8080" # Mapeado no localhost para o Cloudflare Tunnel
          environment:
            GUACD_HOSTNAME: guacd
            POSTGRES_HOSTNAME: postgres
            POSTGRES_DATABASE: guacamole_db
            POSTGRES_USER: guacamole
            POSTGRES_PASSWORD: strong_password_here # Trocar em produção
          depends_on:
            - guacd
            - postgres

- name: Start Guacamole stack
  community.docker.docker_compose_v2:
    project_src: /opt/guacamole
    state: present
